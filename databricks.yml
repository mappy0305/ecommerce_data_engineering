bundle:
  name: dbt_ecommerce_data_engineering

variables:
  warehouse_id:
    description: SQL warehouse ID for the dbt task (overridden per target)
    default: "44e3d822b6f9285d"
  warehouse_id_dev:
    description: SQL warehouse ID for dev target
    default: "44e3d822b6f9285d"
  warehouse_id_prod:
    description: SQL warehouse ID for prod target(in this case its the same as dev)
    default: "44e3d822b6f9285d"
  catalog:
    description: Unity catalog name for dbt
    default: workspace

include:
  - resources/dbt_ecommerce_data_engineering.yml


targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      warehouse_id: ${var.warehouse_id_dev}
      catalog: workspace

  prod:
    mode: production
    default: false
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      warehouse_id: ${var.warehouse_id_prod}
      catalog: workspace